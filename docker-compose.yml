version: "3.9"

services:
  backend:
    build: ./backend
    restart: unless-stopped
    ports:
      - "6020:8000"
    env_file:
      - ./backend/.env

  frontend:
    build:
      context: ./frontend
      args:
        REACT_APP_BACKEND_URL: http://localhost:6020
    restart: unless-stopped
    ports:
      - "6021:80"
    depends_on:
      - backend
